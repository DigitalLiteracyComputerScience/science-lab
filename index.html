<!DOCTYPE html>
<html lang="hy">
<head>

    <title>Բնագիտական Շտեմարան</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; text-align: center; }
        header { background: #2c3e50; color: white; padding: 60px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .geography { background: #e67e22; }
        footer { margin-top: 50px; padding: 20px; color: #7f8c8d; }

        .qr-container {
        margin: 40px auto;
        padding: 20px;
        background: white;
        max-width: 200px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
    }
    .qr-container p {
        font-size: 0.9rem;
        color: #7f8c8d;
        margin-bottom: 10px;
        font-family: sans-serif;
    }
    .qr-image {
        width: 100%;
        height: auto;
        display: block;
